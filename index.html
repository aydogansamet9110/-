<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sil</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    h1 {
      font-size: 3.5rem;
      margin: 0;
    }
    p {
      font-size: 1.8rem;
      margin: 20px 0;
    }
    button {
      padding: 15px 40px;
      font-size: 1.8rem;
      margin: 10px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      transition: all 0.3s;
    }
    #yesBtn {
      background: #4caf50;
    }
    #noBtn {
      background: #f44336;
    }
    #final {
      font-size: 2.5rem;
      margin-top: 40px;
      font-weight: bold;
      min-height: 120px;
      line-height: 1.5;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div>
    <h1>sil</h1>
    <p>Sevgili <span id="isim">dünyanın en iyi arkadaşı</span>,</p>
    <button id="yesBtn" onclick="yesClicked()">sil</button>
    <button id="noBtn" onclick="noClicked()">sil</button>
    <p id="final"></p>
  </div>

  <canvas id="confetti"></canvas>

  <script>
    let yesSize = 1.8;

    function noClicked() {
      yesSize += 0.5;
      document.getElementById('yesBtn').style.fontSize = yesSize + 'rem';
      document.getElementById('yesBtn').style.padding = (15 + yesSize*10) + 'px ' + (40 + yesSize*20) + 'px';

      const noMessages = [
        "sil",
        "sil",
        "sil",
        "sil"
      ];

      let index = Math.min(noMessages.length - 1, Math.floor((yesSize - 1.8) / 0.5));
      document.getElementById('final').innerText = noMessages[index];

      createConfetti(30);
    }

    function yesClicked() {
      document.getElementById('final').innerHTML = `
        O zaman...<br><br>
        sen çok güçlü birisin bunu biliyorsun ben sana güveniyorum toparlayacaksın
      `;

      document.getElementById('yesBtn').innerText = "sen çok güçlü birisin bunu biliyorsun ben sana güveniyorum toparlayacaksın";
      document.getElementById('noBtn').style.display = 'none';
      createConfetti(120);
    }

    function createConfetti(count) {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let particles = [];
      const colors = ['#ff0', '#f00', '#0f0', '#00f', '#ff69b4'];

      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 4 + 2
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
          p.y += p.speed;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
          if (p.y > canvas.height) particles.splice(i, 1);
        });
        if (particles.length) requestAnimationFrame(draw);
      }
      draw();
    }

    createConfetti(40);
  </script>

</body>
</html>
